name: reposcope

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    env_file: .env
    volumes:
      - app-data:/app/data
      - app-exports:/app/.movistan/exports
    environment:
      - DATABASE_URL=file:./data/production.db
      - HOSTNAME=0.0.0.0

volumes:
  app-data:
  app-exports:
